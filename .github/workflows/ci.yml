name: Build, Scan, and Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  CACHE_REPO: docker.io/lukaszp29/cache-zad2

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Pobranie kodu
        uses: actions/checkout@v4

      - name: QEMU (emulacja wielu architektur)
        uses: docker/setup-qemu-action@v3

      - name: Docker Buildx (zaawansowane budowanie)
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host   # <-- KLUCZOWA POPRAWKA

      - name: Logowanie do Docker Hub (do cache)
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Logowanie do GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generowanie metadanych (tagi obrazu)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Uruchomienie lokalnego rejestru (tymczasowego)
        run: |
          docker run -d -p 5000:5000 --name registry registry:2
          sleep 5   # dajemy chwilę, aby rejestr się uruchomił

      - name: Budowanie obrazu i zapis w lokalnym rejestrze (z cache)
        id: build-local
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: localhost:5000/app:scan
          cache-from: type=registry,ref=${{ env.CACHE_REPO }}:cache
          cache-to: type=registry,ref=${{ env.CACHE_REPO }}:cache,mode=max

      - name: Skanowanie obrazu Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'localhost:5000/app:scan'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Publikacja bezpiecznego obrazu w GHCR
        if: success()
        run: |
          TAGS="${{ steps.meta.outputs.tags }}"
          FIRST_TAG=$(echo "$TAGS" | head -n1)
          docker buildx imagetools create --tag "$FIRST_TAG" localhost:5000/app:scan
          for tag in $(echo "$TAGS" | tail -n +2); do
            docker buildx imagetools create --tag "$tag" localhost:5000/app:scan
          done